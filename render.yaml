services:
  # Backend API Service
  - type: web
    name: gse-analyser-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: gse-analyser-client
          property: host

  # Frontend Static Site
  - type: web
    name: gse-analyser-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: gse-analyser-server
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
